<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exaustech · Revisor de Auditoria</title>
<style>
  /* mesma paleta do app principal (index.html) — decisão 04/07: azul do logo #3E7EB0 + cinza/navy.
     Esta tela roda SÓ no navegador (decisão do Raphael de 04/07: "Nova Auditoria Técnica" e tudo
     que gira em torno de importação/revisão é processo à parte, não entra no app mobile). */
  :root{
    --brand:#3E7EB0; --brand-d:#2B5A7E; --brand-dk:#0B2239; --brand-l:#E9F1F8;
    --bg:#FAFBFC; --card:#ffffff; --border:#ECEFF3; --border2:#D7DEE6;
    --txt:#3A4552; --weak:#5F6B77; --weaker:#75818D;
    --succ:#2e844a; --succ-bg:#ebf7ed; --succ-bd:#91db8b;
    --warn:#fe9339; --warn-tx:#8c4b02; --warn-bg:#fef5e8; --warn-bd:#f9c77f;
    --err:#ea001e; --err-tx:#ba0517; --err-bg:#fef1f1; --err-bd:#f5b5b8;
    --neu-bg:#F0F2F5; --neu-tx:#4A5560;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Salesforce Sans',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt)}
  header{background:var(--brand);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
  header h1{font-size:16px;font-weight:600;margin:0}
  header .sub{font-size:12px;opacity:.85}
  header .spacer{flex:1}
  .chip{background:rgba(255,255,255,.18);border-radius:999px;padding:4px 12px;font-size:12px}
  .wrap{max-width:1400px;margin:0 auto;padding:18px 20px 60px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
  .loadbar{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
  .loadbar label{display:block;font-size:11.5px;color:var(--weak);margin-bottom:4px}
  .loadbar input{border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:13px;width:220px}
  .btn{background:var(--brand);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--brand-d)}
  .btn.sec{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.sec:hover{background:var(--brand-l)}
  .btn:disabled{opacity:.5;cursor:default}
  .msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px}
  .msg.err{background:var(--err-bg);color:var(--err-tx);border:1px solid var(--err-bd)}
  .msg.info{background:var(--brand-l);color:var(--brand-d);border:1px solid #9fc6f0}
  .conta-header{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .conta-header .conta-nome{font-size:19px;font-weight:700;color:var(--brand-dk)}
  .conta-header .conta-data{font-size:13px;color:var(--weak)}
  .summary{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;min-width:110px}
  .stat .n{font-size:20px;font-weight:600}
  .stat .l{font-size:11.5px;color:var(--weak)}
  .filtros{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .fbtn{border:1px solid var(--border2);background:#fff;border-radius:999px;padding:6px 13px;font-size:12.5px;cursor:pointer;color:var(--weak)}
  .fbtn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
  .busca-input{width:100%;box-sizing:border-box;border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:13px;margin-bottom:8px}
  .busca-input:focus{outline:none;border-color:var(--brand)}
  .lista{border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:78vh;overflow-y:auto}
  .litem{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;background:#fff}
  .litem:hover{background:var(--brand-l)}
  .litem.sel{background:var(--brand-l);border-left:3px solid var(--brand)}
  .litem .num{font-size:12.5px;font-weight:600;color:var(--brand-d)}
  .litem .txt{font-size:12px;color:var(--weak);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .litem .tags{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap}
  .badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;display:inline-block}
  .badge.forte{background:var(--succ-bg);color:var(--succ)}
  .badge.fraco{background:var(--warn-bg);color:var(--warn-tx)}
  .badge.semmatch{background:var(--err-bg);color:var(--err-tx)}
  .badge.neu{background:var(--neu-bg);color:var(--neu-tx)}
  .badge.confirmada{background:var(--succ-bg);color:var(--succ)}
  .detalhe{border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none}
  .detalhe.show{display:grid;grid-template-columns:1fr 1fr}
  .col{padding:18px}
  .col.left{border-right:1px solid var(--border);background:var(--bg)}
  .col h3{font-size:12.5px;color:var(--weak);margin:0 0 10px;display:flex;align-items:center;gap:6px;font-weight:600}
  .foto-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px}
  .foto-wrap img{width:100%;border-radius:6px;display:block}
  .sem-foto{font-size:12px;color:var(--weaker);text-align:center;padding:30px 10px;background:#fff;border:1px dashed var(--border2);border-radius:8px;margin-bottom:12px}
  .item-num{font-size:13.5px;font-weight:600;margin-bottom:8px}
  .item-texto{font-size:13px;line-height:1.55;color:var(--txt);margin-bottom:10px;white-space:pre-wrap}
  .nota{font-size:12.5px;font-style:italic;color:var(--weak);background:#fff;border-left:2px solid var(--border2);padding:8px 10px;border-radius:0 6px 6px 0}
  .kv{width:100%;font-size:13px;border-collapse:collapse}
  .kv td{padding:6px 0;vertical-align:top}
  .kv td:first-child{color:var(--weak);width:42%}
  .kv td:last-child{text-align:right}
  .actionbar{margin-top:16px;display:flex;gap:10px}
  .placeholder{padding:60px 20px;text-align:center;color:var(--weaker);font-size:13px}
  .hist{border-top:1px solid var(--border);margin-top:0}
  .hist-head{padding:14px 18px;font-size:12.5px;color:var(--weak);font-weight:600;display:flex;align-items:center;gap:8px}
  .hist-head .n{color:var(--txt)}
  .hist-list{padding:0 18px 16px}
  .hist-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff}
  .hist-row:hover{background:var(--brand-l)}
  .hist-row.atual{border-color:var(--brand);background:var(--brand-l)}
  .hist-row .data{font-size:12.5px;font-weight:600;min-width:82px}
  .hist-row .stnome{font-size:12px;color:var(--weak);flex:1}
  .hist-expand{padding:10px 12px;background:var(--bg);border:1px dashed var(--border2);border-radius:8px;margin:-2px 0 8px;font-size:12.5px}
  .hist-expand img{max-width:220px;border-radius:6px;display:block;margin-top:6px}
  .hist-empty{padding:0 18px 16px;font-size:12.5px;color:var(--weaker)}
  .comp-card{margin-bottom:16px}
  .comp-head{font-size:13px;font-weight:600;margin-bottom:10px}
  .comp-sub{font-size:12px;font-weight:600;color:var(--weak);margin:12px 0 6px;display:flex;align-items:center;gap:6px}
  .comp-sub .cnt{background:var(--neu-bg);color:var(--neu-tx);border-radius:999px;padding:0 8px;font-size:11px;font-weight:700}
  .comp-row{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
  .comp-row:last-child{border-bottom:none}
  .comp-row .txt{flex:1;color:var(--txt)}
  .comp-row .num{color:var(--weaker);font-size:11.5px;min-width:52px}
  .arrow{font-weight:700;font-size:14px;min-width:16px;text-align:center}
  .arrow.subiu{color:var(--err-tx)}
  .arrow.desceu{color:var(--succ)}
  .arrow.igual{color:var(--weaker)}
  .risk-chip{font-size:11px;padding:1px 8px;border-radius:999px;background:var(--neu-bg);color:var(--neu-tx);white-space:nowrap}
  .resolvido-chip{font-size:11px;padding:1px 8px;border-radius:999px;background:var(--succ-bg);color:var(--succ);white-space:nowrap}
  .risk-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap;display:inline-block;min-width:64px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>Exaustech · Revisor de Auditoria</h1>
  <div class="spacer"></div>
  <div class="chip" id="userchip">carregando sessão…</div>
</header>
<div class="wrap">
  <div id="msgArea"></div>

  <div class="card loadbar">
    <div>
      <label>Auditoria (Id)</label>
      <input id="inAuditoria" placeholder="a7Ybe000000R9OzEAK">
    </div>
    <div>
      <label>Lote (Id)</label>
      <input id="inLote" placeholder="a1nbe00000BxX6TAAV">
    </div>
    <button class="btn" id="btnCarregar" onclick="carregar()">Carregar lote</button>
  </div>

  <div id="conteudo"></div>
</div>
<script>
const BACKEND = 'https://exaustech-os-backend-1039787065614.southamerica-east1.run.app';
function beTok(){ return localStorage.getItem('be_tok') || sessionStorage.getItem('be_tok'); }

let ST = { auditoriaId:null, loteId:null, lote:null, auditoria:null, linhas:[], selecionadaId:null, filtro:'todas', comparativo:null, busca:'' };
const fotoCache = {}; // driveId -> object URL (evita refetch ao trocar de item e voltar)

function msg(texto, tipo){
  document.getElementById('msgArea').innerHTML = texto ? '<div class="msg '+(tipo||'info')+'">'+escapeHtml(texto)+'</div>' : '';
}

function initSessao(){
  const tok = beTok();
  const nome = localStorage.getItem('be_name') || '';
  const funcao = localStorage.getItem('be_funcao') || '';
  const chip = document.getElementById('userchip');
  if (!tok) {
    chip.textContent = 'sem sessão';
    msg('Você precisa estar logado no app principal (mesma sessão do navegador). Abra o app, faça login, e recarregue esta página.', 'err');
    document.getElementById('btnCarregar').disabled = true;
    return false;
  }
  chip.textContent = nome + (funcao ? ' · ' + funcao : '');
  const last = JSON.parse(localStorage.getItem('revisor_last') || 'null');
  if (last) { document.getElementById('inAuditoria').value = last.auditoriaId || ''; document.getElementById('inLote').value = last.loteId || ''; }
  return true;
}

async function carregar(){
  const auditoriaId = document.getElementById('inAuditoria').value.trim();
  const loteId = document.getElementById('inLote').value.trim();
  if (!auditoriaId || !loteId) { msg('Preencha o Id da Auditoria e do Lote.', 'err'); return; }
  msg('Carregando…', 'info');
  try {
    const r = await fetch(BACKEND + '/exp/auditorias/' + auditoriaId + '/lote/' + loteId, {
      headers: { Authorization: 'Bearer ' + beTok() }
    });
    const j = await r.json();
    if (!r.ok) { msg('Erro: ' + (j.error || r.status), 'err'); return; }
    ST.auditoriaId = auditoriaId; ST.loteId = loteId; ST.lote = j.lote; ST.linhas = j.linhas; ST.auditoria = j.auditoria || null;
    ST.selecionadaId = null; ST.filtro = 'todas'; ST.comparativo = null; ST.busca = '';
    localStorage.setItem('revisor_last', JSON.stringify({ auditoriaId, loteId }));
    msg('');
    renderTudo();
    carregarComparativo(auditoriaId); // best-effort, não bloqueia o resto da tela
  } catch (e) {
    msg('Falha de rede: ' + e.message, 'err');
  }
}

async function carregarComparativo(auditoriaId){
  try {
    const r = await fetch(BACKEND + '/exp/auditorias/' + auditoriaId + '/comparativo', {
      headers: { Authorization: 'Bearer ' + beTok() }
    });
    const j = await r.json();
    if (auditoriaId !== ST.auditoriaId) return; // trocou de lote enquanto isso carregava
    ST.comparativo = r.ok ? j : null;
    renderComparativo();
  } catch (e) { /* best-effort: sem comparativo não impede o resto da revisão */ }
}

function badgeFaixa(faixa){
  const cls = faixa === 'Forte' ? 'forte' : faixa === 'Fraco' ? 'fraco' : 'semmatch';
  return '<span class="badge ' + cls + '">' + faixa + '</span>';
}

function contagem(faixaOrTag){
  if (faixaOrTag === 'foto') return ST.linhas.filter(l => l.possuiFoto).length;
  if (faixaOrTag === 'nota') return ST.linhas.filter(l => l.possuiTextoComplementar).length;
  if (faixaOrTag === 'todas') return ST.linhas.length;
  return ST.linhas.filter(l => l.faixa === faixaOrTag).length;
}

function normalizarBusca(s){
  // minúsculas + sem acento, pra "duto" achar "Duto"/"dúto" igual (mesmo espírito do removerConectivos do backend)
  return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
}

function linhasFiltradas(){
  let base;
  switch (ST.filtro) {
    case 'Forte': case 'Fraco': case 'Sem match': base = ST.linhas.filter(l => l.faixa === ST.filtro); break;
    case 'foto': base = ST.linhas.filter(l => l.possuiFoto); break;
    case 'nota': base = ST.linhas.filter(l => l.possuiTextoComplementar); break;
    default: base = ST.linhas;
  }
  if (!ST.busca.trim()) return base;
  const termo = normalizarBusca(ST.busca);
  return base.filter(l => [l.numeroRelatorio, l.textoOriginal, l.naoConformidadeTexto, l.perguntaTexto]
    .some(campo => campo && normalizarBusca(campo).includes(termo)));
}

function buscarDigitando(valor){
  ST.busca = valor;
  renderLista(); // só a lista — nunca renderTudo() aqui, senão o campo perde o foco a cada tecla
}

function renderTudo(){
  const l = ST.lote;
  const a = ST.auditoria;
  let h = '';
  if (a && (a.contaNome || a.dataInspecao)) {
    h += '<div class="conta-header">'
      + '<span class="conta-nome">' + escapeHtml(a.contaNome || 'Conta não identificada') + '</span>'
      + '<span class="conta-data">Vistoria em ' + formatarData(a.dataInspecao) + '</span>'
      + '</div>';
  }
  h += '<div class="summary">'
    + '<div class="stat"><div class="n">' + (l.totalItens ?? '—') + '</div><div class="l">itens no lote</div></div>'
    + '<div class="stat"><div class="n">' + (l.itensConfirmados ?? 0) + '</div><div class="l">confirmados</div></div>'
    + '<div class="stat"><div class="n">' + (l.itensSemMatch ?? 0) + '</div><div class="l">sem match</div></div>'
    + '<div class="stat"><div class="n">' + (l.nomeArquivo || '—') + '</div><div class="l">arquivo · ' + (l.origem || '') + '</div></div>'
    + '</div>';

  h += '<div id="comparativoWrap"></div>';

  const filtros = [
    ['todas', 'Todas'], ['Forte', 'Forte'], ['Fraco', 'Fraco'], ['Sem match', 'Sem match'],
    ['foto', 'Com foto'], ['nota', 'Com nota']
  ];
  h += '<div class="filtros">' + filtros.map(([k, label]) =>
    '<button class="fbtn ' + (ST.filtro === k ? 'on' : '') + '" onclick="setFiltro(\'' + k + '\')">' + label + ' (' + contagem(k) + ')</button>'
  ).join('') + '</div>';

  h += '<div class="grid">';
  h += '<div>'
    + '<input class="busca-input" id="inBusca" type="text" placeholder="Buscar por número ou texto da não conformidade…" '
    + 'value="' + escapeHtml(ST.busca || '') + '" oninput="buscarDigitando(this.value)">'
    + '<div class="lista" id="listaLinhas"></div>'
    + '</div>';
  h += '<div>' + (ST.selecionadaId
    ? '<div class="detalhe show" id="detalhe"></div><div class="card hist" id="historico" style="margin-top:12px;padding:0"></div>'
    : '<div class="card placeholder">Selecione um item na lista à esquerda pra comparar o PDF com o registro.</div>') + '</div>';
  h += '</div>';

  document.getElementById('conteudo').innerHTML = h;
  renderLista();
  renderComparativo();
  if (ST.selecionadaId) { renderDetalhe(); renderHistorico(ST.selecionadaId); }
}

function formatarData(iso){
  if (!iso) return '—';
  const [ano, mes, dia] = iso.split('-');
  return dia + '/' + mes + '/' + ano;
}

function formatarMesAno(iso){
  if (!iso) return '—/—';
  const [ano, mes] = iso.split('-');
  return mes + '/' + ano.slice(2);
}

// Paleta de risco 0 (mais brando) -> 5 (vermelho) — mesma lógica de cor em toda a tela.
const RISCO_PALETTE = [
  { bg: '#EAF7EC', tx: '#2e844a' }, // 0
  { bg: '#EAF7D8', tx: '#5c8a1f' }, // 1
  { bg: '#FDF6D8', tx: '#8a7a06' }, // 2
  { bg: '#FEF0DB', tx: '#8c4b02' }, // 3
  { bg: '#FCE4D6', tx: '#b5450a' }, // 4
  { bg: '#FDEAEA', tx: '#ba0517' }  // 5
];
function riscoCor(risco){
  if (risco == null || isNaN(risco)) return { bg: 'var(--neu-bg)', tx: 'var(--neu-tx)' };
  const idx = Math.max(0, Math.min(5, Math.round(risco)));
  return RISCO_PALETTE[idx];
}
function riscoPill(risco, iso){
  const c = riscoCor(risco);
  const label = formatarMesAno(iso) + '-R' + (risco == null ? '?' : risco);
  return '<span class="risk-pill" style="background:' + c.bg + ';color:' + c.tx + '">' + label + '</span>';
}

function direcaoArrow(dir){
  if (dir === 'subiu') return '<span class="arrow subiu">▲</span>';
  if (dir === 'desceu') return '<span class="arrow desceu">▼</span>';
  return '<span class="arrow igual">＝</span>';
}

function renderComparativo(){
  const el = document.getElementById('comparativoWrap');
  if (!el) return;
  const c = ST.comparativo;
  if (!c || !c.ok || !c.temAnterior) { el.innerHTML = ''; return; }

  let h = '<div class="card comp-card">';
  h += '<div class="comp-head">Comparativo com o relatório de ' + formatarData(c.dataAnterior) + '</div>';

  h += '<div class="comp-sub">Resolvidos desde a última visita <span class="cnt">' + c.resolvidos.length + '</span></div>';
  h += c.resolvidos.length
    ? c.resolvidos.map((o) =>
        '<div class="comp-row"><span class="resolvido-chip">resolvido</span>'
        + '<span class="txt">' + escapeHtml(o.perguntaTexto || o.naoConformidadeTexto || '—')
        + (o.oportunidade ? ' <span class="risk-chip">Oportunidade: ' + escapeHtml(o.oportunidade.nome || o.oportunidade.oportunidadeId) + (o.oportunidade.stage ? ' · ' + escapeHtml(o.oportunidade.stage) : '') + '</span>' : '')
        + '</span>'
        + '<span class="num">' + escapeHtml(o.numeroRelatorio || '') + '</span></div>'
      ).join('')
    : '<div class="hist-empty" style="padding:0 0 6px">Nenhum item resolvido desde a última visita.</div>';

  h += '<div class="comp-sub">Variação de risco <span class="cnt">' + c.variacoesRisco.length + '</span></div>';
  h += c.variacoesRisco.length
    ? c.variacoesRisco.map((o) =>
        '<div class="comp-row">' + direcaoArrow(o.direcao)
        + '<span class="txt">' + escapeHtml(o.perguntaTexto || o.naoConformidadeTexto || '—')
        + (o.oportunidade ? ' <span class="risk-chip">Oportunidade: ' + escapeHtml(o.oportunidade.nome || o.oportunidade.oportunidadeId) + (o.oportunidade.stage ? ' · ' + escapeHtml(o.oportunidade.stage) : '') + '</span>' : '')
        + '</span>'
        + '<span class="risk-chip">R' + (o.riscoAnterior == null ? '?' : o.riscoAnterior) + ' → R' + (o.riscoAtual == null ? '?' : o.riscoAtual) + '</span>'
        + '<span class="num">' + escapeHtml(o.numeroRelatorio || '') + '</span></div>'
      ).join('')
    : '<div class="hist-empty" style="padding:0 0 6px">Nenhum item em comum entre os dois relatórios.</div>';

  if (c.novos && c.novos.length) {
    h += '<div class="comp-sub">Itens novos (não constavam no relatório anterior) <span class="cnt">' + c.novos.length + '</span></div>';
  }

  h += '</div>';
  el.innerHTML = h;
}

async function renderHistorico(linhaId){
  const el = document.getElementById('historico');
  if (!el) return;
  el.innerHTML = '<div class="hist-head">carregando histórico de reincidência…</div>';
  try {
    const r = await fetch(BACKEND + '/exp/auditorias/linhas/' + linhaId + '/historico', {
      headers: { Authorization: 'Bearer ' + beTok() }
    });
    const j = await r.json();
    if (document.getElementById('historico') !== el) return; // usuário já trocou de item
    if (!r.ok) { el.innerHTML = '<div class="hist-empty">Não foi possível carregar o histórico: ' + escapeHtml(j.error || String(r.status)) + '</div>'; return; }
    if (!j.ocorrencias || j.ocorrencias.length <= 1) {
      el.innerHTML = '<div class="hist-head"><i>Reincidência</i></div><div class="hist-empty">Primeira vez que esse item aparece nesta conta (sem ocorrência anterior encontrada).</div>';
      return;
    }
    const head = '<div class="hist-head">Reincidência — <span class="n">' + j.ocorrencias.length + ' ocorrências</span> desde ' + formatarData(j.primeiraOcorrencia) + '</div>';
    const linhas = j.ocorrencias.map((o, i) =>
      '<div class="hist-row' + (o.atual ? ' atual' : '') + '" onclick="toggleHistExpand(' + i + ')">'
      + riscoPill(o.risco, o.dataInspecao)
      + '<span class="stnome">' + escapeHtml(o.auditoriaNome || '—') + (o.atual ? ' · <b>este registro</b>' : '') + '</span>'
      + badgeFaixa(o.faixa || 'Sem match')
      + '</div>'
      + '<div class="hist-expand" id="histExp' + i + '" style="display:none"></div>'
    ).join('');
    el.innerHTML = head + '<div class="hist-list">' + linhas + '</div>';
    window.__histOcorrencias = j.ocorrencias; // guardado pra expandir sem novo fetch
  } catch (e) {
    if (document.getElementById('historico') === el) el.innerHTML = '<div class="hist-empty">Falha de rede ao buscar histórico: ' + escapeHtml(e.message) + '</div>';
  }
}

function chipOportunidade(oport){
  if (!oport) return '';
  return '<div style="margin-top:6px"><span class="risk-chip">Oportunidade: ' + escapeHtml(oport.nome || oport.oportunidadeId) + (oport.stage ? ' · ' + escapeHtml(oport.stage) : '') + '</span></div>';
}

async function toggleHistExpand(i){
  const box = document.getElementById('histExp' + i);
  if (!box) return;
  if (box.style.display !== 'none') { box.style.display = 'none'; return; }
  const o = (window.__histOcorrencias || [])[i];
  if (!o) return;
  box.style.display = 'block';
  box.innerHTML = escapeHtml(o.textoOriginal || '(sem texto)') + chipOportunidade(o.oportunidade) + (o.possuiFoto ? '<div style="font-size:11.5px;color:var(--weaker)">carregando foto…</div>' : '');
  if (o.possuiFoto) {
    try {
      const url = await fotoBlobUrl(o.fotoUrl);
      box.innerHTML = escapeHtml(o.textoOriginal || '') + chipOportunidade(o.oportunidade) + '<img src="' + url + '" alt="foto da ocorrência anterior">';
    } catch (e) {
      box.innerHTML = escapeHtml(o.textoOriginal || '') + chipOportunidade(o.oportunidade) + '<div style="color:var(--err-tx)">falha ao carregar a foto</div>';
    }
  }
}

function setFiltro(f){ ST.filtro = f; renderTudo(); }

function renderLista(){
  const el = document.getElementById('listaLinhas');
  if (!el) return;
  const linhas = linhasFiltradas();
  if (!linhas.length) {
    el.innerHTML = '<div class="placeholder">Nenhum item encontrado' + (ST.busca.trim() ? ' para "' + escapeHtml(ST.busca) + '"' : ' nesse filtro') + '.</div>';
    return;
  }
  el.innerHTML = linhas.map(l => {
    const tags = [];
    if (l.possuiFoto) tags.push('<span class="badge neu">foto</span>');
    if (l.possuiTextoComplementar) tags.push('<span class="badge neu">nota</span>');
    if (l.status === 'Pendente proposta') tags.push('<span class="badge confirmada">confirmado</span>');
    return '<div class="litem ' + (l.id === ST.selecionadaId ? 'sel' : '') + '" onclick="selecionar(\'' + l.id + '\')">'
      + '<div class="num">' + escapeHtml(l.numeroRelatorio || '—') + ' · ' + badgeFaixa(l.faixa) + ' ' + (l.score != null ? l.score : '') + '</div>'
      + '<div class="txt">' + escapeHtml(l.textoOriginal || '') + '</div>'
      + '<div class="tags">' + tags.join('') + '</div>'
      + '</div>';
  }).join('');
}

function selecionar(id){ ST.selecionadaId = id; renderTudo(); }

function escapeHtml(s){ return String(s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

async function fotoBlobUrl(fotoUrl){
  if (fotoCache[fotoUrl]) return fotoCache[fotoUrl];
  const r = await fetch(BACKEND + fotoUrl, { headers: { Authorization: 'Bearer ' + beTok() } });
  if (!r.ok) throw new Error('foto indisponível');
  const bl = await r.blob();
  const url = URL.createObjectURL(bl);
  fotoCache[fotoUrl] = url;
  return url;
}

async function renderDetalhe(){
  const idAlvo = ST.selecionadaId; // capturado agora: se o usuário trocar de item durante o await da foto abaixo, detectamos e não pintamos a foto errada
  const l = ST.linhas.find(x => x.id === idAlvo);
  const el = document.getElementById('detalhe');
  if (!l || !el) return;

  el.innerHTML =
    '<div class="col left">'
    + '<h3>Recorte do PDF · item ' + escapeHtml(l.numeroRelatorio || '—') + '</h3>'
    + (l.possuiFoto ? '<div class="foto-wrap" id="fotoWrap"><span style="font-size:12px;color:var(--weaker)">carregando foto…</span></div>' : '<div class="sem-foto">Este item não tem foto no laudo.</div>')
    + '<div class="item-texto">' + escapeHtml(l.textoOriginal || '') + '</div>'
    + (l.possuiTextoComplementar ? '<div class="nota">"' + escapeHtml(l.textoComplementar) + '"</div>' : '')
    + '</div>'
    + '<div class="col">'
    + '<h3>Registro no Salesforce</h3>'
    + '<table class="kv">'
    + '<tr><td>Faixa do match</td><td>' + badgeFaixa(l.faixa) + ' ' + (l.score != null ? l.score : '') + '</td></tr>'
    + '<tr><td>Não conformidade</td><td>' + escapeHtml(l.naoConformidadeTexto || '—') + '</td></tr>'
    + '<tr><td>Pergunta</td><td>' + escapeHtml(l.perguntaTexto || '—') + '</td></tr>'
    + '<tr><td>Origem</td><td>' + escapeHtml(l.origem || '—') + '</td></tr>'
    + '<tr><td>Status</td><td>' + escapeHtml(l.status || '—') + '</td></tr>'
    + '</table>'
    + '<div class="actionbar">'
    + '<button class="btn" id="btnConfirmar" onclick="confirmarLinha(\'' + l.id + '\')" ' + (l.status === 'Pendente proposta' ? 'disabled' : '') + '>'
    + (l.status === 'Pendente proposta' ? 'Já confirmado' : 'Confirmar match') + '</button>'
    + '</div>'
    + (l.faixa === 'Sem match' ? '<div class="msg info" style="margin-top:14px">Itens "Sem match" que precisam virar item novo de catálogo ainda não têm tela própria aqui — isso é o wizard de cadastro (em construção, Sócio-only). Por ora, ajuste direto no Salesforce se precisar.</div>' : '')
    + '</div>';

  if (l.possuiFoto) {
    try {
      const url = await fotoBlobUrl(l.fotoUrl);
      if (ST.selecionadaId !== idAlvo) return; // usuário já trocou de item — não pinta foto errada no painel novo
      const wrap = document.getElementById('fotoWrap');
      if (wrap) wrap.innerHTML = '<img src="' + url + '" alt="foto da não conformidade">';
    } catch (e) {
      if (ST.selecionadaId !== idAlvo) return;
      const wrap = document.getElementById('fotoWrap');
      if (wrap) wrap.innerHTML = '<span style="font-size:12px;color:var(--err-tx)">falha ao carregar a foto: ' + escapeHtml(e.message) + '</span>';
    }
  }
}

async function confirmarLinha(linhaId){
  const btn = document.getElementById('btnConfirmar');
  if (btn) { btn.disabled = true; btn.textContent = 'Confirmando…'; }
  try {
    const r = await fetch(BACKEND + '/exp/auditorias/' + ST.auditoriaId + '/linhas/' + linhaId + '/confirmar', {
      method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + beTok() }, body: '{}'
    });
    const j = await r.json();
    if (!r.ok) { msg('Erro ao confirmar: ' + (j.error || r.status), 'err'); if (btn) { btn.disabled = false; btn.textContent = 'Confirmar match'; } return; }
    await carregar(); // recarrega o lote pra refletir o novo status/contadores
    ST.selecionadaId = linhaId; renderTudo();
  } catch (e) {
    msg('Falha de rede ao confirmar: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Confirmar match'; }
  }
}

initSessao();
</script>
</body>
</html>
